<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>送信完了 | DX Factory</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap"
        rel="stylesheet">
</head>

<body
    style="display: flex; align-items: center; justify-content: center; height: 100vh; background-color: var(--c-bg-gray); margin: 0;">
    <div
        style="text-align: center; background: white; padding: 60px 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); max-width: 600px; width: 90%;">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--c-accent-dark)" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 20px;">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
            <polyline points="22 4 12 14.01 9 11.01"></polyline>
        </svg>
        <h1
            style="font-family: var(--font-heading); font-size: 2rem; color: var(--c-black); margin-bottom: 20px; font-weight: 800;">
            送信が完了しました</h1>
        <p style="color: var(--c-text-light); margin-bottom: 40px; line-height: 1.8;">
            お問い合わせありがとうございます。<br>
            内容を確認のうえ、担当者より折り返しご連絡させていただきます。
        </p>
        <a href="/"
            style="display: inline-block; background: var(--c-black); color: var(--c-accent); padding: 15px 40px; border-radius: 4px; font-weight: 700; text-decoration: none; letter-spacing: 0.1em; transition: all 0.3s ease;">トップページへ戻る</a>
    </div>
</body>

</html>
